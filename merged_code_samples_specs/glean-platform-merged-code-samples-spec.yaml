                ])

                # Handle response
                print(res)
        - lang: typescript
          label: Typescript (API Client)
          source: |-
            import { Glean } from "@gleanwork/api-client";

            const glean = new Glean({
              apiToken: process.env["GLEAN_API_TOKEN"] ?? "",
            });

            async function run() {
              const result = await glean.search.query({
                query: "quarterly planning 2026",
                datasources: [
                  "confluence",
                  "google_drive",
                ],
                filters: [
                  {
                    field: "type",
                    values: [
                      "spreadsheet",
                      "presentation",
                    ],
                  },
