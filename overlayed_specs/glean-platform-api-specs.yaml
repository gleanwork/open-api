  /api/search:
    post:
      tags:
        - Search
      summary: Search
      description: |
        Execute a search query and retrieve ranked results. This is the data retrieval variant of the search API and returns only results and pagination state. Structured filters accept exact public built-ins and free-form custom fields.
        Successful responses always include a non-nullable `warnings` array (`[]` when empty). When results are incomplete for the requested datasource scope, the response remains HTTP 200 with `results`, `has_more`, and `next_cursor` preserved and a `results_incomplete` warning. Query outcomes that cannot be honored return HTTP 422 `unprocessable_query` and suppress results and cursor; invalid inline operators may include a nested `/query` `invalid_filter` issue. Backend work and audit logging may already have occurred before such a 422 replaces a result-bearing response. Structural and representability failures remain HTTP 400. Rate limits return HTTP 429 with `Retry-After`. Temporary backend unavailability returns HTTP 503.
      operationId: platform-search
      x-visibility: Public
      x-glean-experimental:
        id: 5ab612fc-ed50-4419-bec3-e5fe83934653
        introduced: "2026-04-08"
      x-codegen-request-body-name: payload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlatformSearchRequest"
      responses:
        "200":
          description: |
            Successful search. Always includes `warnings` (`[]` when empty). A `results_incomplete` warning may be present while results and cursor remain available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformSearchResponse"
        "400":
          $ref: "#/components/responses/PlatformBadRequest"
        "401":
          $ref: "#/components/responses/PlatformUnauthorized"
        "403":
          $ref: "#/components/responses/PlatformForbidden"
        "404":
          $ref: "#/components/responses/PlatformNotFound"
        "408":
          $ref: "#/components/responses/PlatformRequestTimeout"
        "413":
          $ref: "#/components/responses/PlatformRequestTooLarge"
        "422":
          $ref: "#/components/responses/PlatformUnprocessableEntity"
        "429":
          $ref: "#/components/responses/PlatformTooManyRequests"
        "500":
          $ref: "#/components/responses/PlatformInternalServerError"
        "503":
          $ref: "#/components/responses/PlatformServiceUnavailable"
      x-speakeasy-group: search
      x-speakeasy-name-override: query
  /api/search/filters:
    get:
      tags:
        - Search
      summary: List search filters
      description: |
        Discover caller-visible datasources and common built-in filter fields that can be used with Platform Search. This is a best-effort common catalog, not an authoritative inventory of every field search may accept.
        Without `query`, the response returns datasource rows and field metadata without executing search. With a nonblank `query`, exactly one `datasources` value is required and the response may include bounded, non-exhaustive facet values for matching public fields.
      operationId: platform-search-filters
      x-visibility: Public
      x-glean-experimental:
        id: 0b585621-13fb-4544-bf20-5e1c99452735
        introduced: "2026-05-12"
      parameters:
        - in: query
          name: datasources
          description: |
            Restrict metadata to one or more canonical normalized datasource identifiers. With a nonblank `query`, exactly one datasource is required.
          required: false
          schema:
            type: array
            minItems: 1
            items:
              type: string
              minLength: 1
        - in: query
          name: query
          description: |
            Optional search query used to request bounded facet values for the selected datasource. When present it must be nonblank.
          required: false
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Search filter metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformSearchFiltersResponse"
        "400":
          $ref: "#/components/responses/PlatformBadRequest"
        "401":
          $ref: "#/components/responses/PlatformUnauthorized"
        "403":
          $ref: "#/components/responses/PlatformForbidden"
        "404":
          $ref: "#/components/responses/PlatformNotFound"
        "408":
          $ref: "#/components/responses/PlatformRequestTimeout"
        "429":
          $ref: "#/components/responses/PlatformTooManyRequests"
        "500":
          $ref: "#/components/responses/PlatformInternalServerError"
        "503":
          $ref: "#/components/responses/PlatformServiceUnavailable"
      x-speakeasy-group: search
      x-speakeasy-name-override: listFilters
components:
  securitySchemes:
    APIToken:
      type: http
      scheme: bearer
      description: |
        Glean API token. Obtain via Admin Console -> Platform -> API Tokens, or via OAuth 2.0 client credentials flow.
  schemas:
    PlatformWarning:
      type: object
      additionalProperties: false
      required:
        - code
        - message
      description: Non-blocking warning attached to a successful Platform response.
      properties:
        code:
          type: string
          minLength: 1
          description: |
            Open snake_case warning code. Clients must tolerate unknown values; the set of codes is not a closed enum.
          example: results_incomplete
        message:
          type: string
          minLength: 1
          description: Human-readable warning message.
    PlatformAgentsSearchRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          description: Case-insensitive substring to match against agent names. If omitted or empty, no name filter is applied.
          example: HR Policy Agent
    PlatformAgentCapabilities:
      type: object
      additionalProperties: true
      properties:
        ap.io.messages:
          type: boolean
          description: Whether the agent supports messages as input.
        ap.io.streaming:
          type: boolean
          description: Whether the agent supports streaming output.
    PlatformAgent:
      type: object
      required:
        - agent_id
        - name
        - capabilities
      properties:
        agent_id:
          type: string
          description: ID of the agent.
          example: mho4lwzylcozgoc2
        name:
          type: string
          description: Name of the agent.
          example: HR Policy Agent
        description:
          type: string
          description: Description of the agent.
        metadata:
          type: object
          description: Agent metadata.
          additionalProperties: true
        capabilities:
          $ref: "#/components/schemas/PlatformAgentCapabilities"
    PlatformAgentsSearchResponse:
      type: object
      required:
        - agents
        - request_id
      properties:
        agents:
          type: array
          description: Agents matching the search request.
          items:
            $ref: "#/components/schemas/PlatformAgent"
        request_id:
          type: string
          description: Platform-generated request ID for support correlation.
    PlatformProblemDetailCode:
      type: string
      description: Stable machine-readable error code.
      enum:
        - invalid_request
        - missing_required_field
        - invalid_parameter
        - invalid_cursor
        - expired_cursor
        - invalid_filter
        - invalid_datasource
        - authentication_required
        - token_expired
        - insufficient_permissions
        - resource_not_found
        - method_not_allowed
        - request_timeout
        - request_too_large
        - conflict
        - gone
        - unprocessable_query
        - rate_limit_exceeded
        - internal_error
        - service_unavailable
      x-glean-problem-detail-codes:
        invalid_request:
          status: 400
          title: Invalid Request
        missing_required_field:
          status: 400
          title: Missing Required Field
        invalid_parameter:
          status: 400
          title: Invalid Parameter
        invalid_cursor:
          status: 400
          title: Invalid Pagination Cursor
        expired_cursor:
          status: 400
          title: Expired Pagination Cursor
        invalid_filter:
          status: 400
          title: Invalid Filter
        invalid_datasource:
          status: 400
          title: Invalid Datasource
        authentication_required:
          status: 401
          title: Authentication Required
        token_expired:
          status: 401
          title: Token Expired
        insufficient_permissions:
          status: 403
          title: Insufficient Permissions
        resource_not_found:
          status: 404
          title: Resource Not Found
        method_not_allowed:
          status: 405
          title: Method Not Allowed
        request_timeout:
          status: 408
          title: Request Timeout
        request_too_large:
          status: 413
          title: Request Too Large
        conflict:
          status: 409
          title: Conflict
        gone:
          status: 410
          title: Gone
        unprocessable_query:
          status: 422
          title: Unprocessable Query
        rate_limit_exceeded:
          status: 429
          title: Rate Limit Exceeded
        internal_error:
          status: 500
          title: Internal Error
        service_unavailable:
          status: 503
          title: Service Unavailable
      example: invalid_cursor
    PlatformProblemDetailError:
      type: object
      required:
        - pointer
        - detail
      description: Field-level validation problem for a single offending field.
      properties:
        pointer:
          type: string
          description: RFC 6901 JSON Pointer to the offending field.
          example: /messages/0/role
        detail:
          type: string
          description: Human-readable explanation for this field.
          example: "Must be one of: USER, GLEAN_AI."
        code:
          $ref: "#/components/schemas/PlatformProblemDetailCode"
    PlatformProblemDetail:
      type: object
      required:
        - type
        - title
        - status
        - detail
        - code
        - request_id
      description: |
        Error response following RFC 9457, extended with `code` and `documentation_url` for machine-readable classification and self-service remediation.
      properties:
        type:
          type: string
          format: uri
          description: URI identifying the error type.
          example: https://developers.glean.com/errors/invalid-cursor
        title:
          type: string
          description: Short, human-readable summary of the error.
          example: Invalid Pagination Cursor
        status:
          type: integer
          description: HTTP status code mirrored from the response.
          example: 400
        detail:
          type: string
          description: Human-readable explanation specific to this occurrence.
          example: |
            The provided cursor has expired. Start a new search to get a fresh cursor.
        code:
          $ref: "#/components/schemas/PlatformProblemDetailCode"
        documentation_url:
          type: string
          format: uri
          description: Direct URL to documentation for this error code.
          example: https://developers.glean.com/errors/invalid-cursor
        request_id:
          type: string
          description: Platform-generated request ID for support correlation.
          example: req_7f8a9b0c1d2e
        errors:
          type: array
          description: Field-level validation problems, one entry per offending field.
          items:
            $ref: "#/components/schemas/PlatformProblemDetailError"
