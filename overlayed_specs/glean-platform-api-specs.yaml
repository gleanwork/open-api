    PlatformSkillVersionGetResponse:
      type: object
      required:
        - version
        - request_id
      properties:
        version:
          $ref: "#/components/schemas/PlatformSkillVersion"
        request_id:
          type: string
          description: Platform-generated request ID for support correlation.
    PlatformFilterOperator:
      type: string
      description: Supported filter operator.
      enum:
        - EQUALS
        - NOT_EQUALS
        - GT
        - GTE
        - LT
        - LTE
    PlatformFilter:
      type: object
      additionalProperties: false
      required:
        - field
        - values
      description: |
        A single filter criterion. For `EQUALS`, multiple values within a filter are OR'd. For `NOT_EQUALS`, multiple values exclude all listed values. Filters are AND'd with each other and with any inline query operators.
      properties:
        field:
          type: string
          minLength: 1
          description: |
            The field to filter on. Accepts built-in filter field names such as `type`, `owner`, `from`, `author`, `channel`, `status`, `assignee`, `reporter`, `component`, `mentions`, and `collection`, plus custom datasource property names.
          example: type
        values:
          type: array
          minItems: 1
          items:
            type: string
            minLength: 1
          description: One or more values to match.
          example:
            - spreadsheet
            - presentation
        operator:
          allOf:
            - $ref: "#/components/schemas/PlatformFilterOperator"
          description: |
            Comparison operator to apply to this filter. Defaults to `EQUALS`. `GT`, `GTE`, `LT`, and `LTE` range operators require exactly one value; express bounded ranges with multiple filters on the same field.
    PlatformTimeRange:
      type: object
      additionalProperties: false
      description: Filter results to those last updated within this range.
      properties:
        start:
          type: string
          format: date-time
          description: Inclusive lower bound in ISO 8601 format.
        end:
          type: string
          format: date-time
          description: Exclusive upper bound in ISO 8601 format.
    PlatformSearchRequest:
      type: object
      additionalProperties: false
      required:
        - query
      example:
        query: quarterly planning 2026
        datasources:
          - confluence
          - google_drive
        filters:
          - field: type
            values:
              - spreadsheet
              - presentation
      properties:
        query:
          type: string
          minLength: 1
          description: |
            The search query string. Supports inline operators such as `from:jane type:document app:confluence`. Inline operators are AND'd with structured `filters`.
        page_size:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
          description: Number of results to return per page.
        cursor:
          type: string
          nullable: true
          description: |
            Opaque pagination token from a previous response's `next_cursor` field. Omit on the first request.
        datasources:
          type: array
          minItems: 1
          items:
            type: string
            minLength: 1
          description: |
            Restrict results to specific canonical normalized datasource identifiers.
        filters:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/PlatformFilter"
          description: |
            Structured filters applied to search results. Equality operators OR multiple values within a filter. Multiple filters are AND'd together, including range filters on the same field. Filters are AND'd with any inline operators in `query`. Note that conflicting constraints on the same field (e.g., `type:document` in the query and `type: spreadsheet` in a filter) produce an empty result set. Exact public built-ins receive the public operator contract; other nonblank fields pass through as possible custom fields.
        time_range:
          $ref: "#/components/schemas/PlatformTimeRange"
    PlatformResult:
      type: object
      additionalProperties: false
      required:
        - url
        - title
        - datasource
      properties:
        url:
          type: string
          format: uri
          minLength: 1
          description: Canonical URL of the result.
          example: https://company.atlassian.net/wiki/spaces/ENG/pages/12345
        title:
          type: string
          minLength: 1
          description: Result title.
          example: Q2 2026 Platform Roadmap
        snippets:
          type: array
          items:
            type: string
            minLength: 1
          description: Query-relevant plain-text excerpts from the result body.
          example:
            - The platform team will focus on API stability and...
        datasource:
          type: string
          minLength: 1
          description: The datasource this result originates from.
          example: confluence
        document_type:
          type: string
          nullable: true
          minLength: 1
          description: The document type within the datasource.
          example: page
        creator:
          $ref: "#/components/schemas/PlatformPersonReference"
        owner:
          $ref: "#/components/schemas/PlatformPersonReference"
        updated_at:
          type: string
          format: date-time
          nullable: true
          description: When the result was last modified.
        created_at:
          type: string
          format: date-time
          nullable: true
          description: When the result was created.
    PlatformSearchResponse:
      type: object
      additionalProperties: false
      required:
        - results
        - has_more
        - next_cursor
        - request_id
        - warnings
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/PlatformResult"
          description: Ordered list of search results.
        has_more:
          type: boolean
          description: Indicates whether additional pages of results are available.
        next_cursor:
          type: string
          nullable: true
          description: Opaque token to pass as `cursor` in the next request.
        request_id:
          type: string
          minLength: 1
          description: Platform-generated request ID for support correlation.
        warnings:
          type: array
          description: |
            Non-blocking warnings for this response. Always present; empty means `[]`. Clients must tolerate unknown warning codes. Current code `results_incomplete` means some results may be unavailable for the requested datasource scope; results, `has_more`, and `next_cursor` remain present.
          items:
            $ref: "#/components/schemas/PlatformWarning"
    PlatformFilterFieldInfo:
      type: object
      additionalProperties: false
      required:
        - field
        - type
        - operators
      properties:
        field:
          type: string
          minLength: 1
          description: Field name usable in the `filters` array for `POST /api/search`.
          example: status
        type:
          type: string
          minLength: 1
          description: |
            Open field-type string. Current values are `STRING` and `USER`. Clients must tolerate unknown values.
          example: STRING
        operators:
          type: array
          minItems: 1
          description: Supported comparison operators for this field.
          items:
            $ref: "#/components/schemas/PlatformFilterOperator"
        values:
          type: array
          description: |
            Bounded, non-exhaustive facet values for this field. Omitted in catalog-only responses. Present as an array, including `[]`, when query-backed discovery executes. An empty array does not imply that no valid value exists.
          items:
            type: string
            minLength: 1
    PlatformDatasourceFilterInfo:
      type: object
      additionalProperties: false
      required:
        - datasource
        - filters
      properties:
        datasource:
          type: string
          minLength: 1
          description: |
            Stable canonical normalized datasource identifier usable in `POST /api/search` `datasources`.
          example: jira
        filters:
          type: array
          description: |
            Common built-in filter fields for this datasource. May be empty. Absence of a public built-in here does not make that field invalid in `POST /api/search`.
          items:
            $ref: "#/components/schemas/PlatformFilterFieldInfo"
    PlatformSearchFiltersResponse:
      type: object
      additionalProperties: false
      required:
        - datasources
        - request_id
      properties:
        datasources:
          type: array
          description: |
            Datasource metadata visible to the authenticated caller. Each `datasource` value is a canonical normalized identifier usable in `POST /api/search` `datasources`. Empty means no visible datasources.
          items:
            $ref: "#/components/schemas/PlatformDatasourceFilterInfo"
        request_id:
          type: string
          minLength: 1
          description: Platform-generated request ID for support correlation.
  responses:
    PlatformBadRequest:
      description: Invalid request (malformed JSON, invalid parameter values, unknown fields).
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/PlatformProblemDetail"
    PlatformUnauthorized:
      description: Missing or invalid authentication token.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/PlatformProblemDetail"
    PlatformForbidden:
      description: Token valid but lacks permission for the requested operation.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/PlatformProblemDetail"
    PlatformNotFound:
      description: Resource not found.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/PlatformProblemDetail"
    PlatformRequestTimeout:
      description: Backend did not respond within the timeout window.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/PlatformProblemDetail"
    PlatformRequestTooLarge:
      description: Request body exceeds the maximum allowed size.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/PlatformProblemDetail"
    PlatformTooManyRequests:
      description: Rate limit exceeded. Includes Retry-After header.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/PlatformProblemDetail"
    PlatformInternalServerError:
      description: Unexpected server-side failure.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/PlatformProblemDetail"
    PlatformServiceUnavailable:
      description: Backend temporarily unavailable.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/PlatformProblemDetail"
    PlatformConflict:
      description: Request conflicts with current state of the resource.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/PlatformProblemDetail"
    PlatformUnprocessableEntity:
      description: Syntactically valid but semantically incorrect request.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/PlatformProblemDetail"
