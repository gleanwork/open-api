openapi: 3.0.0
info:
  version: "2026-04-01"
  title: Glean Platform API
  x-source-commit-sha: 77d699703c1f0cd76fabd3fa1dde772bd0c67509
  x-open-api-commit-sha: 03138d28a5220afba7b0893fe57d6663a7713f32
servers:
  - url: https://{instance}-be.glean.com
    variables:
      instance:
        default: instance-name
        description: The instance name (typically the email domain without the TLD) that determines the deployment backend.
security:
  - APIToken: []
paths:
  /api/documents/batch:
    post:
      tags:
        - Documents
      summary: Retrieve documents
      description: |
        Retrieve details for a batch of documents by URL, Glean document ID, or user-generated content reference. The response preserves request order and reports per-document lookup failures alongside successful results.
      operationId: platform-documents-batch
      x-visibility: Public
      x-glean-experimental:
        id: 9eb7c7c2-9807-4e64-bc53-7b10aeff813f
        introduced: "2026-06-02"
      x-codegen-request-body-name: payload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlatformDocumentsBatchRequest"
      responses:
        "200":
          description: Successful batch retrieval.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformDocumentsBatchResponse"
        "400":
          $ref: "#/components/responses/PlatformBadRequest"
        "401":
          $ref: "#/components/responses/PlatformUnauthorized"
        "403":
          $ref: "#/components/responses/PlatformForbidden"
        "404":
          $ref: "#/components/responses/PlatformNotFound"
        "408":
          $ref: "#/components/responses/PlatformRequestTimeout"
        "429":
          $ref: "#/components/responses/PlatformTooManyRequests"
        "500":
          $ref: "#/components/responses/PlatformInternalServerError"
        "503":
          $ref: "#/components/responses/PlatformServiceUnavailable"
      x-speakeasy-group: platform.documents
      x-speakeasy-name-override: batch
  /api/documents/{id}/permissions:
    get:
      tags:
        - Documents
      summary: Retrieve document permissions
      description: |
        Retrieve whether a document is visible to everyone and the email addresses of users who have access to it.
      operationId: platform-documents-permissions
      x-visibility: Public
      x-glean-experimental:
        id: 45684a5a-b8c0-4c2c-b022-50e2583666ff
        introduced: "2026-06-03"
      parameters:
        - name: id
          in: path
          required: true
          description: Glean document ID.
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Successful document permissions retrieval.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformDocumentPermissionsResponse"
        "400":
          $ref: "#/components/responses/PlatformBadRequest"
        "401":
          $ref: "#/components/responses/PlatformUnauthorized"
        "403":
          $ref: "#/components/responses/PlatformForbidden"
        "404":
          $ref: "#/components/responses/PlatformNotFound"
        "408":
          $ref: "#/components/responses/PlatformRequestTimeout"
        "429":
          $ref: "#/components/responses/PlatformTooManyRequests"
        "500":
          $ref: "#/components/responses/PlatformInternalServerError"
        "503":
          $ref: "#/components/responses/PlatformServiceUnavailable"
      x-speakeasy-group: platform.documents
      x-speakeasy-name-override: getPermissions
  /api/people/search:
    post:
      tags:
        - People
      summary: Search people
      description: |
        Retrieve people by Glean person ID or email address. When no identifiers are provided, the authenticated user's profile is returned.
      operationId: platform-people-search
      x-visibility: Public
      x-glean-experimental:
        id: 51692e94-d9ff-4e5b-b5b5-4b78c4a9879a
        introduced: "2026-05-18"
      x-codegen-request-body-name: payload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlatformPeopleSearchRequest"
      responses:
        "200":
          description: Successful people response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformPeopleSearchResponse"
        "400":
          $ref: "#/components/responses/PlatformBadRequest"
        "401":
          $ref: "#/components/responses/PlatformUnauthorized"
        "403":
          $ref: "#/components/responses/PlatformForbidden"
        "404":
          $ref: "#/components/responses/PlatformNotFound"
        "408":
          $ref: "#/components/responses/PlatformRequestTimeout"
        "429":
          $ref: "#/components/responses/PlatformTooManyRequests"
        "500":
          $ref: "#/components/responses/PlatformInternalServerError"
        "503":
          $ref: "#/components/responses/PlatformServiceUnavailable"
      x-speakeasy-group: platform.people
      x-speakeasy-name-override: search
  /api/agents/search:
    post:
      tags:
        - Agents
      summary: Search agents
      description: |
        Search agents available to the authenticated user by agent name.
      operationId: platform-agents-search
      x-visibility: Public
      x-glean-experimental:
        id: 4abc1e17-8e06-490b-99a7-e8f97592405a
        introduced: "2026-05-12"
      x-codegen-request-body-name: payload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlatformAgentsSearchRequest"
      responses:
        "200":
          description: Successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformAgentsSearchResponse"
        "400":
          $ref: "#/components/responses/PlatformBadRequest"
        "401":
          $ref: "#/components/responses/PlatformUnauthorized"
        "403":
          $ref: "#/components/responses/PlatformForbidden"
        "404":
          $ref: "#/components/responses/PlatformNotFound"
        "408":
          $ref: "#/components/responses/PlatformRequestTimeout"
        "429":
          $ref: "#/components/responses/PlatformTooManyRequests"
        "500":
          $ref: "#/components/responses/PlatformInternalServerError"
        "503":
          $ref: "#/components/responses/PlatformServiceUnavailable"
      x-speakeasy-group: platform.agents
      x-speakeasy-name-override: search
  /api/agents/{agent_id}:
    get:
      tags:
        - Agents
      summary: Get agent
      description: |
        Retrieve details for an agent available to the authenticated user.
      operationId: platform-agents-get
      x-visibility: Public
      x-glean-experimental:
        id: 009b3e94-694b-4deb-b80a-c67011173715
        introduced: "2026-05-12"
      parameters:
        - in: path
          name: agent_id
          description: ID of the agent to retrieve.
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformAgentGetResponse"
        "400":
          $ref: "#/components/responses/PlatformBadRequest"
        "401":
          $ref: "#/components/responses/PlatformUnauthorized"
        "403":
          $ref: "#/components/responses/PlatformForbidden"
        "404":
          $ref: "#/components/responses/PlatformNotFound"
        "408":
          $ref: "#/components/responses/PlatformRequestTimeout"
        "429":
          $ref: "#/components/responses/PlatformTooManyRequests"
        "500":
          $ref: "#/components/responses/PlatformInternalServerError"
        "503":
          $ref: "#/components/responses/PlatformServiceUnavailable"
      x-speakeasy-group: platform.agents
      x-speakeasy-name-override: get
  /api/agents/{agent_id}/schemas:
    get:
      tags:
        - Agents
      summary: Get agent schemas
      description: |
        Retrieve an agent's input and output JSON schemas.
      operationId: platform-agents-get-schemas
      x-visibility: Public
      x-glean-experimental:
        id: b40b4dd3-3839-48e6-9e45-7e63e8148b49
        introduced: "2026-05-12"
      parameters:
        - in: path
          name: agent_id
          description: ID of the agent whose schemas should be retrieved.
          required: true
          schema:
            type: string
            minLength: 1
        - in: query
          name: include_tools
          description: Whether to include tool metadata in the response.
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformAgentSchemasResponse"
        "400":
          $ref: "#/components/responses/PlatformBadRequest"
        "401":
          $ref: "#/components/responses/PlatformUnauthorized"
        "403":
          $ref: "#/components/responses/PlatformForbidden"
        "404":
          $ref: "#/components/responses/PlatformNotFound"
        "408":
          $ref: "#/components/responses/PlatformRequestTimeout"
        "429":
          $ref: "#/components/responses/PlatformTooManyRequests"
        "500":
          $ref: "#/components/responses/PlatformInternalServerError"
        "503":
          $ref: "#/components/responses/PlatformServiceUnavailable"
      x-speakeasy-group: platform.agents
      x-speakeasy-name-override: getSchemas
  /api/agents/{agent_id}/runs:
    post:
      tags:
        - Agents
      summary: Create agent run
      description: |
        Execute an agent run. Set `stream` to true to receive server-sent events; otherwise the response contains the final agent messages.
      operationId: platform-agents-create-run
      x-visibility: Public
      x-glean-experimental:
        id: 26bba669-2e92-4e5d-9798-6a532fae4e9f
        introduced: "2026-05-12"
      x-codegen-request-body-name: payload
      parameters:
        - in: path
          name: agent_id
          description: ID of the agent to run.
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlatformAgentRunCreateRequest"
      responses:
        "200":
          description: Successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformAgentRunWaitResponse"
            text/event-stream:
              schema:
                type: string
                description: Server-sent events emitted by the running agent.
                example: |
                  id: 1
                  event: message
                  data: {"messages":[{"role":"GLEAN_AI","content":[{"text":"Hello","type":"text"}]}]}

                  id: 2
                  event: message
                  data: {"messages":[{"role":"GLEAN_AI","content":[{"text":", I can help with HR policy questions.","type":"text"}]}]}
        "400":
          $ref: "#/components/responses/PlatformBadRequest"
        "401":
          $ref: "#/components/responses/PlatformUnauthorized"
        "403":
          $ref: "#/components/responses/PlatformForbidden"
        "404":
          $ref: "#/components/responses/PlatformNotFound"
        "408":
          $ref: "#/components/responses/PlatformRequestTimeout"
        "409":
          $ref: "#/components/responses/PlatformConflict"
        "429":
          $ref: "#/components/responses/PlatformTooManyRequests"
        "500":
          $ref: "#/components/responses/PlatformInternalServerError"
        "503":
          $ref: "#/components/responses/PlatformServiceUnavailable"
      x-speakeasy-group: platform.agents
      x-speakeasy-name-override: createRun
  /api/tools:
    get:
      tags:
        - Tools
      summary: List tools
      description: |
        List tools available to the authenticated user, optionally filtered by tool name.
      operationId: platform-tools-list
      x-visibility: Public
      x-glean-experimental:
        id: 3cb43a04-ad52-4c25-be62-3ce1daffd513
        introduced: "2026-05-06"
      parameters:
        - in: query
          name: tool_names
          description: Optional comma-delimited list of tool names to return.
          required: false
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
      responses:
        "200":
          description: Successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformToolsListResponse"
        "400":
          $ref: "#/components/responses/PlatformBadRequest"
        "401":
          $ref: "#/components/responses/PlatformUnauthorized"
        "403":
          $ref: "#/components/responses/PlatformForbidden"
        "404":
          $ref: "#/components/responses/PlatformNotFound"
        "408":
          $ref: "#/components/responses/PlatformRequestTimeout"
        "429":
          $ref: "#/components/responses/PlatformTooManyRequests"
        "500":
          $ref: "#/components/responses/PlatformInternalServerError"
        "503":
          $ref: "#/components/responses/PlatformServiceUnavailable"
      x-speakeasy-group: platform.tools
      x-speakeasy-name-override: list
  /api/tools/call:
    post:
      tags:
        - Tools
      summary: Call tool
      description: |
        Execute a tool available to the authenticated user with the provided parameters.
      operationId: platform-tools-call
      x-visibility: Public
      x-glean-experimental:
        id: 9ea7c149-7d5b-4c62-860d-afb56481069a
        introduced: "2026-05-08"
      x-codegen-request-body-name: payload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlatformToolsCallRequest"
      responses:
        "200":
          description: Successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformToolsCallResponse"
        "400":
          $ref: "#/components/responses/PlatformBadRequest"
        "401":
          $ref: "#/components/responses/PlatformUnauthorized"
        "403":
          $ref: "#/components/responses/PlatformForbidden"
        "404":
          $ref: "#/components/responses/PlatformNotFound"
        "408":
          $ref: "#/components/responses/PlatformRequestTimeout"
        "429":
          $ref: "#/components/responses/PlatformTooManyRequests"
        "500":
          $ref: "#/components/responses/PlatformInternalServerError"
        "503":
          $ref: "#/components/responses/PlatformServiceUnavailable"
      x-speakeasy-group: platform.tools
      x-speakeasy-name-override: call
  /api/search:
    post:
      tags:
        - Search
      summary: Search
      description: |
        Execute a search query and retrieve ranked results. This is the data retrieval variant of the search API and returns only results and pagination state.
      operationId: platform-search
      x-visibility: Public
      x-glean-experimental:
        id: 5ab612fc-ed50-4419-bec3-e5fe83934653
        introduced: "2026-04-08"
      x-codegen-request-body-name: payload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlatformSearchRequest"
      responses:
        "200":
          description: Successful search.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformSearchResponse"
        "400":
          $ref: "#/components/responses/PlatformBadRequest"
        "401":
          $ref: "#/components/responses/PlatformUnauthorized"
        "403":
          $ref: "#/components/responses/PlatformForbidden"
        "404":
          $ref: "#/components/responses/PlatformNotFound"
        "408":
          $ref: "#/components/responses/PlatformRequestTimeout"
        "429":
          $ref: "#/components/responses/PlatformTooManyRequests"
        "500":
          $ref: "#/components/responses/PlatformInternalServerError"
        "503":
          $ref: "#/components/responses/PlatformServiceUnavailable"
      x-speakeasy-group: platform.search
      x-speakeasy-name-override: query
  /api/summarize:
    post:
      tags:
        - Summarize
      summary: Summarize documents
      description: |
        Generate an AI summary of one or more documents. Supply documents by URL, Glean document ID, or user-generated content reference.
      operationId: platform-summarize
      x-visibility: Public
      x-glean-experimental:
        id: 4d2f8b2e-7c9d-4f4f-9b1d-4d2f8b2e7c9d
        introduced: "2026-05-27"
      x-codegen-request-body-name: payload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlatformSummarizeRequest"
      responses:
        "200":
          description: Successful summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformSummarizeResponse"
        "400":
          $ref: "#/components/responses/PlatformBadRequest"
        "401":
          $ref: "#/components/responses/PlatformUnauthorized"
        "403":
          $ref: "#/components/responses/PlatformForbidden"
        "404":
          $ref: "#/components/responses/PlatformNotFound"
        "408":
          $ref: "#/components/responses/PlatformRequestTimeout"
        "429":
          $ref: "#/components/responses/PlatformTooManyRequests"
        "500":
          $ref: "#/components/responses/PlatformInternalServerError"
        "503":
          $ref: "#/components/responses/PlatformServiceUnavailable"
      x-speakeasy-group: platform.summarize
      x-speakeasy-name-override: create
components:
  securitySchemes:
    APIToken:
      type: http
      scheme: bearer
      description: |
        Glean API token. Obtain via Admin Console -> Platform -> API Tokens, or via OAuth 2.0 client credentials flow.
  schemas:
    PlatformUgcType:
      type: string
      enum:
        - ANNOUNCEMENTS
        - ANSWERS
        - COLLECTIONS
        - SHORTCUTS
      description: Type of user-generated content.
    PlatformDocumentSpec:
      type: object
      description: |
        Reference to a document. Exactly one of `url`, `id`, or `content_id` with `ugc_type` must be provided.
      oneOf:
        - type: object
          additionalProperties: false
          required:
            - url
          properties:
            url:
              type: string
              description: URL of the document.
        - type: object
          additionalProperties: false
          required:
            - id
          properties:
            id:
              type: string
              description: Glean document ID.
        - type: object
          additionalProperties: false
          required:
            - content_id
            - ugc_type
          properties:
            content_id:
              type: integer
              format: int32
              description: Numeric ID of the user-generated content item.
            ugc_type:
              $ref: "#/components/schemas/PlatformUgcType"
            doc_type:
              type: string
              description: Specific subtype of the user-generated content item.
    PlatformDocumentIncludeField:
      type: string
      enum:
        - LAST_VIEWED_AT
        - VISITORS_COUNT
        - RECENT_SHARES
        - DOCUMENT_CONTENT
        - CUSTOM_METADATA
      description: Optional fields that can be included in returned documents.
    PlatformDocumentsBatchRequest:
      type: object
      additionalProperties: false
      required:
        - document_specs
      properties:
        document_specs:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/PlatformDocumentSpec"
          description: Documents to retrieve.
        include_fields:
          type: array
          items:
            $ref: "#/components/schemas/PlatformDocumentIncludeField"
          description: Additional document fields to include in the response.
    PlatformDocumentContent:
      type: object
      properties:
        full_text_list:
          type: array
          items:
            type: string
          description: Plaintext content of the document.
    PlatformDocumentReference:
      type: object
      properties:
        id:
          type: string
          description: Glean document ID.
        title:
          type: string
          description: Title of the referenced document.
        url:
          type: string
          description: Permalink for the referenced document.
    PlatformCountInfo:
      type: object
      properties:
        count:
          type: integer
          format: int64
        period:
          type: string
          description: Human-readable period represented by this count.
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
    PlatformPerson:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        obfuscated_id:
          type: string
    PlatformShare:
      type: object
      properties:
        num_days_ago:
          type: integer
          description: Number of days since the share occurred.
        sharer:
          $ref: "#/components/schemas/PlatformPerson"
        sharing_document:
          $ref: "#/components/schemas/PlatformDocumentReference"
    PlatformDocumentInteractions:
      type: object
      properties:
        visitor_count:
          $ref: "#/components/schemas/PlatformCountInfo"
        shares:
          type: array
          items:
            $ref: "#/components/schemas/PlatformShare"
    PlatformViewerInfo:
      type: object
      properties:
        last_viewed_time:
          type: string
          format: date-time
    PlatformCustomDataValue:
      type: object
      properties:
        string_value:
          type: string
        string_list_value:
          type: array
          items:
            type: string
    PlatformDocumentMetadata:
      type: object
      properties:
        datasource:
          type: string
        datasource_instance:
          type: string
          description: Datasource instance from which the document was extracted.
        object_type:
          type: string
          description: Datasource-specific object type.
        container:
          type: string
          description: Name of the higher-level container.
        container_id:
          type: string
          description: Glean document ID of the container.
        parent_id:
          type: string
          description: Glean document ID of the direct parent.
        mime_type:
          type: string
        interactions:
          $ref: "#/components/schemas/PlatformDocumentInteractions"
        viewer_info:
          $ref: "#/components/schemas/PlatformViewerInfo"
        custom_data:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/PlatformCustomDataValue"
          description: Custom metadata requested via `CUSTOM_METADATA`.
    PlatformDocumentSection:
      type: object
      properties:
        title:
          type: string
          description: Section title.
        url:
          type: string
          description: Permalink for the section.
    PlatformDocument:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          description: Glean document ID.
        datasource:
          type: string
          description: App or repository type from which the document was extracted.
        connector_type:
          type: string
          description: Connector type for the source system.
        document_type:
          type: string
          description: Datasource-specific type of the document.
        title:
          type: string
          description: Title of the document.
        url:
          type: string
          description: Permalink for the document.
        content:
          $ref: "#/components/schemas/PlatformDocumentContent"
        container_document:
          $ref: "#/components/schemas/PlatformDocumentReference"
        parent_document:
          $ref: "#/components/schemas/PlatformDocumentReference"
        metadata:
          $ref: "#/components/schemas/PlatformDocumentMetadata"
        sections:
          type: array
          items:
            $ref: "#/components/schemas/PlatformDocumentSection"
          description: Content subsections in the document.
    PlatformDocumentBatchErrorCode:
      type: string
      enum:
        - NOT_FOUND_OR_NOT_ALLOWED
        - INVALID_DOCUMENT_SPEC
        - ANNOTATION_ERROR
        - DOCUMENT_GENERATION_ERROR
      description: Stable machine-readable item-level failure code.
    PlatformDocumentBatchError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          $ref: "#/components/schemas/PlatformDocumentBatchErrorCode"
        message:
          type: string
          description: Human-readable explanation for the item-level failure.
    PlatformDocumentBatchResult:
      description: |
        One document retrieval result. Successful results include `document`; lookup failures include `error`.
      oneOf:
        - type: object
          additionalProperties: false
          required:
            - status
            - document
          properties:
            status:
              type: string
              enum:
                - FOUND
            document:
              $ref: "#/components/schemas/PlatformDocument"
        - type: object
          additionalProperties: false
          required:
            - status
            - error
          properties:
            status:
              type: string
              enum:
                - NOT_FOUND
                - INVALID
                - ERROR
            error:
              $ref: "#/components/schemas/PlatformDocumentBatchError"
    PlatformDocumentsBatchResponse:
      type: object
      required:
        - request_id
        - results
      properties:
        request_id:
          type: string
          description: Server-generated identifier for this response, useful for support.
        results:
          type: array
          items:
            $ref: "#/components/schemas/PlatformDocumentBatchResult"
          description: Results in the same order as `document_specs`.
    PlatformProblemDetail:
      type: object
      required:
        - type
        - title
        - status
        - detail
        - code
        - request_id
      description: |
        Error response following RFC 9457, extended with `code` and `documentation_url` for machine-readable classification and self-service remediation.
      properties:
        type:
          type: string
          format: uri
          description: URI identifying the error type.
          example: https://developer.glean.com/errors/invalid-cursor
        title:
          type: string
          description: Short, human-readable summary of the error.
          example: Invalid Pagination Cursor
        status:
          type: integer
          description: HTTP status code mirrored from the response.
          example: 400
        detail:
          type: string
          description: Human-readable explanation specific to this occurrence.
          example: |
            The provided cursor has expired. Start a new search to get a fresh cursor.
        code:
          type: string
          description: Stable machine-readable error code.
          enum:
            - invalid_request
            - missing_required_field
            - invalid_parameter
            - invalid_cursor
            - expired_cursor
            - invalid_filter
            - invalid_datasource
            - authentication_required
            - token_expired
            - insufficient_permissions
            - resource_not_found
            - method_not_allowed
            - request_timeout
            - conflict
            - gone
            - unprocessable_query
            - rate_limit_exceeded
            - internal_error
            - service_unavailable
          example: invalid_cursor
        documentation_url:
          type: string
          format: uri
          description: Direct URL to documentation for this error code.
          example: https://developer.glean.com/errors/invalid-cursor
        request_id:
          type: string
          description: Platform-generated request ID for support correlation.
          example: req_7f8a9b0c1d2e
    PlatformDocumentPermissionsResponse:
